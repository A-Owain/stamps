<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مولّد الختم الفوري</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@500;700&family=Tajawal:wght@500;700;800&family=Cairo:wght@600;700;800&family=Noto+Kufi+Arabic:wght@500;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'PingAR';
      src: url('./assets/fonts/PingAR+LT-Medium.otf') format('opentype');
      font-weight: 500;
      font-style: normal;
    }
    @font-face {
      font-family: 'PingAR';
      src: url('./assets/fonts/PingAR+LT-bold.otf') format('opentype');
      font-weight: 800;
      font-style: normal;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'PingAR', Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }
    .wrap {
      max-width: 1240px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 24px;
      align-items: start;
    }
    .panel, .preview {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      padding: 20px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 800;
    }
    .sub {
      margin: 0 0 18px;
      color: #6b7280;
      line-height: 1.8;
      font-size: 14px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin: 14px 0 8px;
    }
    input, select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 16px;
      font-family: inherit;
      background: #fff;
    }
    .radio-row {
      display: flex;
      gap: 20px;
      margin-top: 6px;
      flex-wrap: wrap;
    }
    .radio-row label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0;
      font-weight: 700;
      cursor: pointer;
    }
    .radio-row input {
      width: auto;
      margin: 0;
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }
    button {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
    }
    .main {
      background: #111;
      color: #fff;
    }
    .ghost {
      background: #f3f4f6;
      color: #111;
      border: 1px solid #e5e7eb;
    }
    .stage {
      min-height: 520px;
      border: 1px dashed #d1d5db;
      border-radius: 16px;
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: auto;
    }
    #previewCanvas {
      max-width: 100%;
      height: auto;
      display: block;
      background: transparent;
    }
    .hint {
      margin-top: 14px;
      color: #6b7280;
      font-size: 12px;
      line-height: 1.8;
    }
    .mini {
      font-size: 12px;
      color: #6b7280;
      margin-top: 10px;
      line-height: 1.8;
    }
    @media (max-width: 900px) {
      .wrap { grid-template-columns: 1fr; }
      .stage { min-height: 360px; }
    }

    
  </style>
</head>
<body>
  <div class="wrap">
    <aside class="panel">
      <h1>مولّد الختم الفوري</h1>
      <p class="sub">أداة لتوليد وإنتاج ختم فوري للمنشأة</p>

      <label>نوع المنشأة</label>
      <div class="radio-row">
        <label><input type="radio" name="businessType" value="شركة" checked> شركة</label>
        <label><input type="radio" name="businessType" value="مؤسسة"> مؤسسة</label>
      </div>

      <label for="fontSelect">الخط</label>
      <select id="fontSelect">
        <option value="PingAR" selected>PingAR</option>
        <option value="IBM Plex Sans Arabic">IBM Plex Sans Arabic</option>
        <option value="Tajawal">Tajawal</option>
        <option value="Cairo">Cairo</option>
        <option value="Noto Kufi Arabic">Noto Kufi Arabic</option>
      </select>

      <label for="businessName">اسم المنشأة</label>
      <input id="businessName" type="text" placeholder="مثال: الواجهة الحديثة للأغذية">

      <label for="crNumber">رقم السجل التجاري</label>
      <input id="crNumber" type="text" inputmode="numeric" placeholder="مثال: 1010******">

      <label for="bgMode">الخلفية</label>
      <select id="bgMode">
        <option value="transparent" selected>شفافة</option>
        <option value="white">بيضاء</option>
      </select>

      <!--<label for="pngSize">جودة PNG</label>
      <select id="pngSize">
        <option value="2">عالية</option>
        <option value="3" selected>أعلى</option>
        <option value="4">فائقة</option>
      </select>-->

      <div class="actions">
        <button class="main" id="downloadBtn" type="button">تنزيل PNG</button>
        <button class="ghost" id="resetBtn" type="button">إعادة الضبط</button>
      </div>

      <p class="hint">
        - تأكد من إدخال رقم السجل التجاري وليس الرقم الموحد.<br>
        - تأكد من إدخال اسم المنشأة كما هو في سهل.<br>
      </p>
    </aside>

    <section class="preview">
      <div class="stage">
        <canvas id="previewCanvas" width="1300" height="760"></canvas>
      </div>
      <div class="mini">معاينة الختم</div>
    </section>
  </div>

  <script>
    const canvas = document.getElementById('previewCanvas');
    const ctx = canvas.getContext('2d');

    const businessNameInput = document.getElementById('businessName');
    const crNumberInput = document.getElementById('crNumber');
    const fontSelect = document.getElementById('fontSelect');
    const bgModeSelect = document.getElementById('bgMode');
    const pngSizeSelect = document.getElementById('pngSize') || { value: '3' };
    const businessTypeInputs = document.querySelectorAll('input[name="businessType"]');
    const downloadBtn = document.getElementById('downloadBtn');
    const resetBtn = document.getElementById('resetBtn');

    const defaults = {
      businessName: '',
      crNumber: '',
      businessType: 'شركة',
      font: 'PingAR',
      bgMode: 'transparent',
      pngSize: '3'
    };

    function toArabicDigits(value) {
      const map = {'0':'٠','1':'١','2':'٢','3':'٣','4':'٤','5':'٥','6':'٦','7':'٧','8':'٨','9':'٩'};
      return String(value || '').replace(/[0-9]/g, d => map[d]);
    }

    function sanitizeNumber(value) {
      const arabicToEnglishMap = {
        '٠':'0','١':'1','٢':'2','٣':'3','٤':'4',
        '٥':'5','٦':'6','٧':'7','٨':'8','٩':'9',
        '۰':'0','۱':'1','۲':'2','۳':'3','۴':'4',
        '۵':'5','۶':'6','۷':'7','۸':'8','۹':'9'
      };

  return String(value || '')
    .replace(/[٠-٩۰-۹]/g, d => arabicToEnglishMap[d] || d)
    .replace(/[^\d]/g, '');
}

    function getBusinessType() {
      return document.querySelector('input[name="businessType"]:checked')?.value || defaults.businessType;
    }

    function getFontFamily() {
      return fontSelect.value || defaults.font;
    }

    function setCanvasBackground(context, mode, w, h) {
      if (mode === 'white') {
        context.fillStyle = '#ffffff';
        context.fillRect(0, 0, w, h);
      } else {
        context.clearRect(0, 0, w, h);
      }
    }

    function fitSingleLineText(context, text, family, weight, maxWidth, startSize, minSize) {
      let size = startSize;
      while (size > minSize) {
        context.font = `${weight} ${size}px "${family}", Arial, sans-serif`;
        if (context.measureText(text).width <= maxWidth) return size;
        size -= 1;
      }
      return minSize;
    }

    function wrapArabicText(context, text, maxWidth) {
      const words = String(text || '').trim().split(/\s+/).filter(Boolean);
      if (!words.length) return [];
      const lines = [];
      let current = words[0];

      for (let i = 1; i < words.length; i++) {
        const test = current + ' ' + words[i];
        if (context.measureText(test).width <= maxWidth) {
          current = test;
        } else {
          lines.push(current);
          current = words[i];
        }
      }
      lines.push(current);
      return lines;
    }

    function fitWrappedText(context, text, family, weight, maxWidth, maxLines, startSize, minSize) {
      let size = startSize;
      while (size >= minSize) {
        context.font = `${weight} ${size}px "${family}", Arial, sans-serif`;
        const lines = wrapArabicText(context, text, maxWidth);
        if (lines.length <= maxLines) return { size, lines };
        size -= 1;
      }
      context.font = `${weight} ${minSize}px "${family}", Arial, sans-serif`;
      return { size: minSize, lines: wrapArabicText(context, text, maxWidth).slice(0, maxLines) };
    }

    function drawCenteredMultiline(context, lines, x, centerY, lineHeight) {
      if (!lines.length) return;
      const totalHeight = lineHeight * (lines.length - 1);
      const startY = centerY - (totalHeight / 2);
      lines.forEach((line, idx) => {
        context.fillText(line, x, startY + (idx * lineHeight));
      });
    }

    async function ensureFontReady() {
      const family = getFontFamily();
      try {
        await document.fonts.load(`800 48px "${family}"`);
        await document.fonts.ready;
      } catch (e) {}
    }

    function drawRoundedRect(ctx, x, y, width, height, radius) {
  ctx.beginPath();

  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + width - radius, y);
  ctx.quadraticCurveTo(x + width, y, x + width, y + radius);

  ctx.lineTo(x + width, y + height - radius);
  ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);

  ctx.lineTo(x + radius, y + height);
  ctx.quadraticCurveTo(x, y + height, x, y + height - radius);

  ctx.lineTo(x, y + radius);
  ctx.quadraticCurveTo(x, y, x + radius, y);

  ctx.closePath();
  ctx.stroke();
}function drawRoundedRect(ctx, x, y, width, height, radius) {
  ctx.beginPath();

  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + width - radius, y);
  ctx.quadraticCurveTo(x + width, y, x + width, y + radius);

  ctx.lineTo(x + width, y + height - radius);
  ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);

  ctx.lineTo(x + radius, y + height);
  ctx.quadraticCurveTo(x, y + height, x, y + height - radius);

  ctx.lineTo(x, y + radius);
  ctx.quadraticCurveTo(x, y, x + radius, y);

  ctx.closePath();
  ctx.stroke();
}

    async function render() {
      const businessType = getBusinessType();
      const businessName = (businessNameInput.value || '').trim();
      const rawNumber = sanitizeNumber(crNumberInput.value || '');
      const fontFamily = getFontFamily();
      crNumberInput.value = rawNumber;

      await ensureFontReady();

      setCanvasBackground(ctx, bgModeSelect.value, canvas.width, canvas.height);

      // Borders
      ctx.strokeStyle = '#000';

      ctx.lineWidth = 10;
      drawRoundedRect(ctx, 55, 55, 1190, 650, 40);

      ctx.lineWidth = 4;
      drawRoundedRect(ctx, 85, 85, 1130, 590, 28);

      ctx.beginPath();
      ctx.moveTo(140, 205);
      ctx.lineTo(1160, 205);
      ctx.moveTo(140, 515);
      ctx.lineTo(1160, 515);
      ctx.stroke();

      ctx.fillStyle = '#000';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.direction = 'rtl';

      // Business type
      const businessTypeSize = fitSingleLineText(ctx, businessType, fontFamily, 900, 900, 60, 36);
      ctx.font = `900 ${businessTypeSize}px "${fontFamily}", Arial, sans-serif`;
      ctx.fillText(businessType, 650, 150);

      // Business name
      const nameFit = fitWrappedText(ctx, businessName || ' ', fontFamily, 800, 960, 3, 56, 24);
      ctx.font = `800 ${nameFit.size}px "${fontFamily}", Arial, sans-serif`;
      const lineHeight = Math.round(nameFit.size * 1.45);
      drawCenteredMultiline(ctx, nameFit.lines, 650, 360, lineHeight);

      // CR number
      const crText = `السجل التجاري: ${rawNumber}`;
      const crSize = fitSingleLineText(ctx, crText, fontFamily, 900, 980, 40, 24);
      ctx.font = `900 ${crSize}px "${fontFamily}", Arial, sans-serif`;
      ctx.fillText(crText, 650, 595);
    }

    async function downloadPNG() {
      await render();

      const exportCanvas = document.createElement('canvas');
      const scale = Number(pngSizeSelect.value || 6);

      exportCanvas.width = canvas.width * scale;
      exportCanvas.height = canvas.height * scale;

      const exportCtx = exportCanvas.getContext('2d');

      exportCtx.imageSmoothingEnabled = true;
      exportCtx.imageSmoothingQuality = 'high';
      exportCtx.scale(scale, scale);

      if (bgModeSelect.value === 'white') {
        exportCtx.fillStyle = '#ffffff';
        exportCtx.fillRect(0, 0, canvas.width, canvas.height);
      } else {
        exportCtx.clearRect(0, 0, canvas.width, canvas.height);
      }

      exportCtx.drawImage(canvas, 0, 0);

      const a = document.createElement('a');
      const name = (businessNameInput.value || 'stamp')
        .replace(/[<>:"/\\|?*]+/g, '')
        .trim()
        .slice(0, 50) || 'stamp';

      a.href = exportCanvas.toDataURL('image/png');
      a.download = `${name}-rect-stamp.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    function resetAll() {
      businessNameInput.value = defaults.businessName;
      crNumberInput.value = defaults.crNumber;
      fontSelect.value = defaults.font;
      bgModeSelect.value = defaults.bgMode;
      if (document.getElementById('pngSize')) {
      pngSizeSelect.value = defaults.pngSize;
    }
      businessTypeInputs.forEach(input => {
        input.checked = input.value === defaults.businessType;
      });
      render();
    }

    businessNameInput.addEventListener('input', render);
    crNumberInput.addEventListener('input', render);
    fontSelect.addEventListener('change', render);
    bgModeSelect.addEventListener('change', render);
    businessTypeInputs.forEach(r => r.addEventListener('change', render));
    downloadBtn.addEventListener('click', downloadPNG);
    resetBtn.addEventListener('click', resetAll);

    document.fonts.ready.then(render);
    window.addEventListener('load', render);
  </script>
</body>
</html>
